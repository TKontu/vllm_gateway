networks:
  vllm_network:
    driver: bridge

services:
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    image: my-vllm-gateway:latest
    container_name: vllm_gateway
    ports:
      - "9003:9000"
    environment:
      # --- SECRETS / INFRA ---
      # Per-model tuning (memory, context length, quantization, etc.) now lives in the
      # mounted config file (MODELS_CONFIG_FILE, default /app/config/models.yaml).
      # See config/models.yaml.example. Only secrets and infrastructure live here.
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN}
      VLLM_IMAGE: ${VLLM_IMAGE:-vllm/vllm-openai:v0.16.0}
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}

      # Path to the per-model config (mounted read-only at /app/config below).
      MODELS_CONFIG_FILE: ${MODELS_CONFIG_FILE:-/app/config/models.yaml}

      # --- PLACEMENT ---
      # budget (default): GPU_BUDGET_FRACTION is a per-GPU TOTAL cap; each model is sized to only
      #   what it needs and many models pack per card. Requires max_model_len > 0 for every model.
      # whole_card: legacy one-model-per-card with LRU swap. See config/models.yaml.example.
      PLACEMENT_MODE: ${PLACEMENT_MODE:-budget}
      GPU_BUDGET_FRACTION: ${GPU_BUDGET_FRACTION:-0.90}
      BUDGET_OVERHEAD_FACTOR: ${BUDGET_OVERHEAD_FACTOR:-1.1}
      BUDGET_OVERHEAD_MIB: ${BUDGET_OVERHEAD_MIB:-1024}

      # --- QUEUEING (per model) ---
      # Max concurrent requests forwarded to each model's vLLM, and max requests queued before
      # the gateway returns 429. (KV-cache capacity still bounds true concurrency — see README.)
      GATEWAY_MAX_CONCURRENT: ${GATEWAY_MAX_CONCURRENT:-50}
      GATEWAY_MAX_QUEUE_SIZE: ${GATEWAY_MAX_QUEUE_SIZE:-200}

      # --- GPU PINNING / POOLS ---
      # For multi-GPU, declare a 'pools:' section in models.yaml (one gateway manages
      # several GPUs and places each model on a GPU in its pool). For a single GPU, leave
      # GATEWAY_GPU_UUID blank to use all GPUs, or set it to a UUID from `nvidia-smi -L`
      # to pin this gateway (and every container it launches) to one GPU. 'pools' wins if set.
      GATEWAY_GPU_UUID: ${GATEWAY_GPU_UUID:-}

      # --- NETWORKING ---
      DOCKER_NETWORK_NAME: ${DOCKER_NETWORK_NAME:-vllm_network}
      GATEWAY_CONTAINER_NAME: ${GATEWAY_CONTAINER_NAME:-vllm_gateway}
      VLLM_CONTAINER_PREFIX: ${VLLM_CONTAINER_PREFIX:-vllm_server}

      # --- WORKER CUDA / DRIVER ---
      # Optional LD_LIBRARY_PATH applied to every vLLM worker container. Leave blank normally.
      # Set it when the host NVIDIA driver is NEWER than the vLLM image's bundled cuda-compat lib
      # (symptom: workers crash at startup with CUDA error 803 / "unsupported display driver / cuda
      # driver combination"). Point it at the host driver libs the NVIDIA Container Toolkit mounts:
      #   WORKER_LD_LIBRARY_PATH=/usr/lib/x86_64-linux-gnu:/usr/local/nvidia/lib64:/usr/local/cuda/lib64
      WORKER_LD_LIBRARY_PATH: ${WORKER_LD_LIBRARY_PATH:-}

      # --- PATHS (HOST) ---
      HOST_CACHE_DIR: ${HOST_CACHE_DIR:-/root/.cache/huggingface}
      HOST_TEMP_DIR: ${HOST_TEMP_DIR:-/tmp}

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOST_CACHE_DIR:-/root/.cache/huggingface}:/root/.cache/huggingface
      # Mount a directory for data persistence (app will create files inside)
      - ${HOST_DATA_DIR:-./data}:/app/data
      - ${HOST_TEMP_DIR:-/tmp}:${VLLM_TEMP_DIR:-/tmp}
      # Per-model configuration (read-only), mounted at /app/config (MODELS_CONFIG_FILE points here).
      # Set HOST_CONFIG_DIR to an absolute host dir (e.g. /models/vllm-gateway/config) that contains
      # your models.yaml — so the config can live on the host and be configured purely via env (no
      # compose edit needed). Defaults to ./config in the stack dir for local/dev use.
      - ${HOST_CONFIG_DIR:-./config}:/app/config:ro

    networks:
      - vllm_network

    restart: unless-stopped














